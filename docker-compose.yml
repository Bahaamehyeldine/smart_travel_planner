services:
  db:
    image: pgvector/pgvector:pg16
    container_name: travel_planner_db
    environment:
      POSTGRES_USER: bahaa
      POSTGRES_PASSWORD: bahaa123
      POSTGRES_DB: travel_planner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bahaa -d travel_planner"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travel_planner_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount data directory so models and cache persist
      - ./data:/app/../data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travel_planner_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
