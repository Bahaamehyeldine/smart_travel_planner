services:
  db:
    image: pgvector/pgvector:pg16
    container_name: travel_planner_db
    environment:
      POSTGRES_USER: bahaa
      POSTGRES_PASSWORD: bahaa123
      POSTGRES_DB: travel_planner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: